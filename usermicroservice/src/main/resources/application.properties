spring.application.name=usermicroservice
server.port=8080

# Database configuration
spring.datasource.url=jdbc:mysql://db1:3306/mydatabase
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Add this line
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#OAuth2 Configuration
app.baseUrl=http://localhost:8080/api
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.facebook.client-id=1559972675696918
spring.security.oauth2.client.registration.facebook.client-secret=3e16d4c1a3bfd297d29433f6b11400d0
spring.security.oauth2.client.registration.facebook.redirect-uri=http://localhost:8080/api/login/oauth2/code/facebook
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

eureka.client.serviceUrl.defaultZone=http://java5:8761/eureka/

